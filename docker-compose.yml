version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: geofleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: geofleet_user
      POSTGRES_PASSWORD: geofleet_password
      POSTGRES_DB: geofleet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: geofleet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redis/redisinsight:latest
    container_name: geofleet-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

  # Microservices
  driver-service:
    build:
      context: ./services/driver
    container_name: geofleet-driver
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://geofleet_user:geofleet_password@postgres:5432/geofleet_db
    depends_on:
      - postgres

  location-ingest:
    build:
      context: ./services/location_ingest
    container_name: geofleet-location-ingest
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  location-processor:
    build:
      context: ./services/location_processor
    container_name: geofleet-location-processor
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  nearby-search:
    build:
      context: ./services/nearby_search
    container_name: geofleet-nearby-search
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
