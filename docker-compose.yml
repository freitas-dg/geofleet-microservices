version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: geofleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: geofleet_user
      POSTGRES_PASSWORD: geofleet_password
      POSTGRES_DB: geofleet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: geofleet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redis/redisinsight:latest
    container_name: geofleet-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
